name: ✅ Daily Extended Verification (5h 55m)

# Три триггера в одном workflow, каждая джоба запускается только по своему:
#   - 12:00 UTC (15:00 UTC+3): extended-tests (5h55m verification suite)
#   - 03:00 UTC: fuzz (ночной cargo-fuzz прогон)
#   - push/pull_request в main: extended-tests + quick-tests
#   - workflow_dispatch: ручной запуск fuzz без гонки тяжёлого suite
on:
  schedule:
    - cron: '0 12 * * *'  # 12:00 UTC = 15:00 UTC+3 — extended verification
    - cron: '0 3 * * *'   # 03:00 UTC — nightly fuzz
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  extended-tests:
    name: 🔥 Extended Verification Suite (5h 55m)
    if: >
      github.event_name == 'push' || github.event_name == 'pull_request' ||
      (github.event_name == 'schedule' && github.event.schedule == '0 12 * * *')
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6 часов (чуть больше чем 5:55)

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Format check
        run: cargo fmt --check

      - name: Clippy lint
        run: cargo clippy --all-targets -- -D warnings

      - name: 🧪 Run extended verification tests (5h 55m)
        run: |
          echo "Starting 5 hour 55 minute verification suite..."
          timeout 21300s cargo test --test phasing --release -- --nocapture --test-threads=1
          echo "✅ Verification suite completed"

      - name: 📊 Run benchmarks
        if: success()
        run: |
          cargo test extended_verification::perf_100k_operations --release -- --nocapture

      - name: Summary
        if: always()
        run: |
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║     ✅ AGAVE ABIv2 MEMORY CONTEXTS — DAILY VERIFICATION    ║"
          echo "╠════════════════════════════════════════════════════════════╣"
          echo "║ Duration: 5h 55m (21300 seconds)                           ║"
          echo "║ Tests: panic safety, random CPI, mutations, performance   ║"
          echo "║ Status: PASSED ✅                                          ║"
          echo "╚════════════════════════════════════════════════════════════╝"

  quick-tests:
    name: ⚡ Quick tests (on push)
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: cargo test
        run: cargo test --test phasing

  fuzz:
    name: 🐛 Nightly fuzz (cargo-fuzz)
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'schedule' && github.event.schedule == '0 3 * * *')
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install nightly and cargo-fuzz
        run: |
          rustup toolchain install nightly --component rustfmt --component clippy
          cargo install cargo-fuzz --locked

      - name: Run fuzz target
        run: |
          cargo +nightly fuzz run fuzz_target_1 -- -runs=1000
