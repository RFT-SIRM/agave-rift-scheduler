name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Lint, format, unit tests ──────────────────────────────────────────────
  test:
    name: ⚡ Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Format check
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --lib --tests -- -D warnings
      - name: Unit tests
        run: cargo test --lib

  # ── Criterion benchmarks (Rust ≥ 1.80 required for criterion 0.5) ────────
  bench:
    name: 📊 Benchmarks
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Enable criterion and build benches
        run: |
          cat >> Cargo.toml << 'TOML'

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }

[[bench]]
name = "scheduler_bench"
harness = false
TOML
          cargo build --benches

  # ── Fuzz smoke test: 60 s with libFuzzer / nightly ───────────────────────
  fuzz-smoke:
    name: 🔥 Fuzz smoke (60 s)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked
      - name: Run scheduler_fuzz for 60 s
        working-directory: fuzz
        run: cargo +nightly fuzz run scheduler_fuzz -- -max_total_time=60
