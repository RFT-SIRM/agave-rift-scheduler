name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Format check
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --lib --tests -- -D warnings
      - name: Unit tests
        run: cargo test --lib

  fuzz-daily:
    name: Fuzz 5h 55m (daily)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 370
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked
      - name: Run scheduler_fuzz 5h 55m
        working-directory: fuzz
        run: cargo +nightly fuzz run scheduler_fuzz -- -max_total_time=21300

  fuzz-smoke:
    name: Fuzz smoke (60s on push)
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked
      - name: Run scheduler_fuzz 60s
        working-directory: fuzz
        run: cargo +nightly fuzz run scheduler_fuzz -- -max_total_time=60
