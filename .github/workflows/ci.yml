name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Format check
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --lib --tests -- -D warnings
      - name: Unit tests
        run: cargo test --lib

  fuzz-smoke:
    name: Fuzz smoke (60s)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked
      - name: Run scheduler_fuzz 60s
        working-directory: fuzz
        run: cargo +nightly fuzz run scheduler_fuzz -- -max_total_time=60
